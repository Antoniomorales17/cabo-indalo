<main class="bg-[var(--sand)] text-slate-800">
  <app-hero-section></app-hero-section>
  <app-gallery-bento></app-gallery-bento>
  <div
    class="section-fade"
    style="background: linear-gradient(to bottom, var(--sand), var(--foam))"
  ></div>
  <app-features-section></app-features-section>
  <div
    class="section-fade"
    style="background: linear-gradient(to bottom, var(--foam), var(--sand))"
  ></div>
  <app-location-section></app-location-section>
  <app-local-guides-section></app-local-guides-section>
  <div
    class="section-fade"
    style="background: linear-gradient(to bottom, var(--sand), var(--foam))"
  ></div>
  @defer (on viewport) {
    <app-guest-registration-section></app-guest-registration-section>
  } @placeholder {
    <section class="bg-[var(--foam)]">
      <div class="mx-auto w-full max-w-7xl px-6 py-20 sm:px-10">
        <div class="h-64 animate-pulse rounded-2xl bg-white/80"></div>
      </div>
    </section>
  }
  <div
    class="section-fade"
    style="background: linear-gradient(to bottom, var(--foam), #ffffff)"
  ></div>
  <app-faq-section></app-faq-section>
  <div
    class="section-fade"
    style="background: linear-gradient(to bottom, #ffffff, var(--sand))"
  ></div>
  <app-cta-section></app-cta-section>
  <div
    class="section-fade"
    style="background: linear-gradient(to bottom, var(--sand), #ffffff)"
  ></div>
  @defer (on viewport) {
    <app-contact-section></app-contact-section>
  } @placeholder {
    <section class="bg-white">
      <div class="mx-auto w-full max-w-7xl px-6 py-20 sm:px-10">
        <div class="h-44 animate-pulse rounded-2xl bg-slate-100"></div>
      </div>
    </section>
  }
  <app-footer></app-footer>
</main>
