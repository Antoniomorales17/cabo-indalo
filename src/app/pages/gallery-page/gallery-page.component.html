<main class="bg-[var(--sand)] text-slate-800">
  <section class="bg-[var(--sea-dark)] py-16 text-white">
    <div class="mx-auto flex w-full max-w-7xl flex-col gap-6 px-6 sm:px-10">
      <a
        [routerLink]="homeRoute"
        class="inline-flex w-fit items-center rounded-lg border border-white/50 px-4 py-2 text-sm font-medium transition hover:bg-white/15"
      >
        {{ 'galleryPage.back' | translate }}
      </a>
      <div>
        <p class="text-sm font-semibold uppercase tracking-wider text-[var(--sun)]">{{ 'galleryPage.eyebrow' | translate }}</p>
        <h1 class="mt-2 text-4xl font-bold sm:text-5xl">{{ 'galleryPage.title' | translate }}</h1>
        <p class="mt-3 max-w-2xl text-white/90">
          {{ 'galleryPage.subtitle' | translate }}
        </p>
      </div>
    </div>
  </section>

  <section class="mx-auto w-full max-w-7xl px-6 py-16 sm:px-10">
    <div class="columns-1 gap-4 sm:columns-2 lg:columns-3">
      @for (image of galleryImages; track image.src) {
        <figure class="mb-4 overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
          <img [src]="image.src" [alt]="image.altKey | translate" class="w-full object-cover transition duration-300 hover:scale-[1.02]" />
        </figure>
      }
    </div>
  </section>

  <app-footer></app-footer>
</main>
