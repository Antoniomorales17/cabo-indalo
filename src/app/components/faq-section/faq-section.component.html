<section id="faqs" class="scroll-mt-24 bg-white">
  <div class="mx-auto max-w-4xl px-6 py-20 sm:px-10">
    <div appRevealOnScroll class="text-center">
      <p class="text-sm font-semibold uppercase tracking-wider text-[var(--sea-dark)]">
        {{ 'faq.eyebrow' | translate }}
      </p>
      <h2 class="mt-2 text-3xl font-bold text-slate-900 sm:text-4xl">
        {{ 'faq.title' | translate }}
      </h2>
      <p class="mx-auto mt-4 max-w-2xl text-slate-600">
        {{ 'faq.subtitle' | translate }}
      </p>
    </div>

    <div
      class="mt-12 divide-y divide-slate-200 rounded-2xl border border-slate-200 bg-[var(--foam)]"
    >
      @for (key of faqKeys; track key; let i = $index) {
        <div appRevealOnScroll [revealDelay]="i * 60">
          <button
            type="button"
            (click)="toggle(i)"
            class="flex w-full items-center justify-between gap-4 px-6 py-5 text-left transition-colors hover:bg-[var(--sea)]/5"
            [attr.aria-expanded]="openIndex === i"
            [attr.aria-controls]="'faq-panel-' + i"
          >
            <span class="text-base font-semibold text-slate-900 sm:text-lg">
              {{ 'faq.items.' + key + '.q' | translate }}
            </span>
            <svg
              class="h-5 w-5 shrink-0 text-[var(--sea-dark)] transition-transform duration-300"
              [class.rotate-180]="openIndex === i"
              viewBox="0 0 20 20"
              fill="currentColor"
              aria-hidden="true"
            >
              <path
                fill-rule="evenodd"
                d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"
                clip-rule="evenodd"
              />
            </svg>
          </button>
          <div
            [id]="'faq-panel-' + i"
            role="region"
            class="grid transition-all duration-300 ease-in-out"
            [class.grid-rows-[1fr]]="openIndex === i"
            [class.grid-rows-[0fr]]="openIndex !== i"
          >
            <div class="overflow-hidden">
              <p class="px-6 pb-5 text-sm leading-relaxed text-slate-600 sm:text-base">
                {{ 'faq.items.' + key + '.a' | translate }}
              </p>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
