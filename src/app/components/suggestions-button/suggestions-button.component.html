<button
  type="button"
  class="inline-flex items-center gap-2 rounded-xl bg-[var(--sea-dark)] px-5 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-[var(--sea)] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[var(--sea-dark)] focus-visible:ring-offset-2"
  (click)="openModal()"
>
  {{ 'suggestions.button' | translate }}
</button>

@if (isOpen()) {
  <div class="fixed inset-0 z-50 bg-slate-950/60 p-4 backdrop-blur-sm sm:p-8" (click)="closeModal()">
    <div
      class="mx-auto mt-8 w-full max-w-lg rounded-2xl bg-white p-6 shadow-2xl sm:mt-12 sm:p-7"
      role="dialog"
      aria-modal="true"
      (click)="$event.stopPropagation()"
    >
      <div class="mb-4 flex items-start justify-between gap-4">
        <div>
          <p class="text-xs font-semibold uppercase tracking-wider text-[var(--sea-dark)]">
            {{ 'suggestions.eyebrow' | translate }}
          </p>
          <h3 class="mt-1 text-xl font-bold text-slate-900">{{ 'suggestions.title' | translate }}</h3>
          <p class="mt-2 text-sm text-slate-600">{{ 'suggestions.subtitle' | translate }}</p>
        </div>
        <button
          type="button"
          class="inline-flex h-9 w-9 items-center justify-center rounded-full border border-slate-300 text-xl leading-none text-slate-700 transition hover:bg-slate-100"
          (click)="closeModal()"
          [attr.aria-label]="'suggestions.close' | translate"
        >
          &times;
        </button>
      </div>

      <form class="space-y-3" [formGroup]="suggestionForm" (ngSubmit)="sendSuggestion()">
        <label class="flex flex-col gap-1 text-sm font-medium text-slate-800">
          {{ 'suggestions.name' | translate }}
          <input
            formControlName="name"
            type="text"
            class="rounded-xl border border-slate-300 px-3 py-2 text-sm focus:border-[var(--sea)] focus:outline-none"
            [placeholder]="'suggestions.namePlaceholder' | translate"
          />
        </label>

        <label class="flex flex-col gap-1 text-sm font-medium text-slate-800">
          {{ 'suggestions.email' | translate }}
          <input
            formControlName="email"
            type="email"
            class="rounded-xl border border-slate-300 px-3 py-2 text-sm focus:border-[var(--sea)] focus:outline-none"
            [placeholder]="'suggestions.emailPlaceholder' | translate"
          />
          @if (hasError('email')) {
            <span class="text-xs text-red-600">{{ 'suggestions.invalidEmail' | translate }}</span>
          }
        </label>

        <label class="flex flex-col gap-1 text-sm font-medium text-slate-800">
          {{ 'suggestions.message' | translate }}
          <textarea
            formControlName="message"
            rows="5"
            class="rounded-xl border border-slate-300 px-3 py-2 text-sm focus:border-[var(--sea)] focus:outline-none"
            [placeholder]="'suggestions.messagePlaceholder' | translate"
          ></textarea>
          @if (hasError('message')) {
            <span class="text-xs text-red-600">{{ 'suggestions.invalidMessage' | translate }}</span>
          }
        </label>

        <div class="flex items-center gap-2 pt-1">
          <button
            type="submit"
            class="inline-flex items-center rounded-xl bg-[var(--sea-dark)] px-4 py-2 text-sm font-semibold text-white transition hover:bg-[var(--sea)] disabled:cursor-not-allowed disabled:opacity-70"
            [disabled]="isSending()"
          >
            {{ isSending() ? ('suggestions.sending' | translate) : ('suggestions.send' | translate) }}
          </button>

          <button
            type="button"
            class="inline-flex items-center rounded-xl border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-100"
            (click)="closeModal()"
          >
            {{ 'suggestions.cancel' | translate }}
          </button>
        </div>

        @if (statusMessage()) {
          <p
            class="pt-1 text-sm"
            [class.text-emerald-700]="statusKind() === 'ok'"
            [class.text-red-700]="statusKind() === 'error'"
          >
            {{ statusMessage() }}
          </p>
        }
      </form>
    </div>
  </div>
}
